name: Deploy GitHub Pages site

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - ".nojekyll"
      - "tools/hoverpreview-tools/site/**"
      - "tools/ukgeo-tools/uk_world_data_gb/hoverpreviews/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Stage root Pages site
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/tools/hoverpreview-tools _site/tools/ukgeo-tools/uk_world_data_gb
          cp index.html _site/index.html
          cp .nojekyll _site/.nojekyll
          cp -R tools/hoverpreview-tools/site _site/tools/hoverpreview-tools/site
          if [ -d tools/ukgeo-tools/uk_world_data_gb/hoverpreviews ]; then
            cp -R tools/ukgeo-tools/uk_world_data_gb/hoverpreviews _site/tools/ukgeo-tools/uk_world_data_gb/hoverpreviews
          else
            echo "::warning::tools/ukgeo-tools/uk_world_data_gb/hoverpreviews is missing; the page will load but show the empty state."
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
